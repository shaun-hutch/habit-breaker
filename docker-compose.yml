services:
  db:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: habitbreaker-db
    environment:
      SA_PASSWORD: "${SA_PASSWORD}"
      ACCEPT_EULA: "Y"
      MSSQL_PID: "Express"
    ports:
      - "1433:1433"
    volumes:
      - sqldata:/var/opt/mssql
      - ./src/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"${SA_PASSWORD}\" -Q \"SELECT 1\" -C -b -o /dev/null"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: habitbreaker-app
    environment:
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:80"
      ConnectionStrings__DefaultConnection: "Server=db,1433;Database=HabitBreaker;User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;"
      JwtSettings__Secret: "${JWT_SECRET}"
      JwtSettings__Issuer: "${JWT_ISSUER:-HabitBreaker}"
      JwtSettings__Audience: "${JWT_AUDIENCE:-HabitBreakerUsers}"
      JwtSettings__ExpiryMinutes: "${JWT_EXPIRY_MINUTES:-60}"
      VapidSettings__PublicKey: "${VAPID_PUBLIC_KEY}"
      VapidSettings__PrivateKey: "${VAPID_PRIVATE_KEY}"
      VapidSettings__Subject: "${VAPID_SUBJECT}"
      AllowedOrigins: "${ALLOWED_ORIGINS:-http://localhost}"
    ports:
      - "80:80"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  sqldata:
